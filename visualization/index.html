<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Atlas — tech.notes.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #070709;
      --bg-2:    #0d0d12;
      --border:  rgba(255,255,255,0.06);
      --text:    #f0f0f0;
      --muted:   rgba(255,255,255,0.32);
      --amber:   #C9A84C;
      --amber-d: rgba(201,168,76,0.18);
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Inter', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: var(--sans);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── GRAIN CANVAS ── */
    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.45;
    }

    /* ── ATLAS SVG ── */
    #atlas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      cursor: default;
    }

    /* ── HEADER ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0 1.75rem;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,7,9,0.9);
      backdrop-filter: blur(8px);
    }

    #logo {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--amber);
      flex-shrink: 0;
    }

    #breadcrumb {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      flex: 1;
    }

    .bc-sep { margin: 0 0.4em; opacity: 0.4; }
    .bc-home { cursor: pointer; transition: color 0.15s; }
    .bc-home:hover { color: var(--amber); }

    #search-wrap {
      position: relative;
      flex-shrink: 0;
    }

    #search {
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.3rem 0.75rem 0.3rem 1.8rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text);
      width: 180px;
      outline: none;
      transition: border-color 0.2s, width 0.3s;
    }
    #search:focus { border-color: rgba(201,168,76,0.4); width: 240px; }
    #search::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 0.55rem; top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      color: var(--muted);
      pointer-events: none;
    }

    #reset-btn {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--amber);
      background: none;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 4px;
      padding: 0.28rem 0.65rem;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #reset-btn:hover { background: var(--amber-d); }

    /* ── NOTE CARD ── */
    #note-card {
      position: fixed;
      right: 1.5rem;
      top: 68px;
      width: 256px;
      background: rgba(13,13,18,0.95);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      z-index: 10;
      opacity: 0;
      transform: translateX(16px);
      pointer-events: none;
      backdrop-filter: blur(10px);
    }

    #nc-bar {
      width: 100%;
      height: 1px;
      background: var(--amber);
      margin-bottom: 1rem;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    #note-card.visible #nc-bar { transform: scaleX(1); }

    #nc-domain {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      color: var(--amber);
    }

    #nc-title {
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.35;
      color: #fff;
      margin-bottom: 0.7rem;
    }

    #nc-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.7rem;
    }

    .nc-tag {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
    }

    #nc-meta {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    #nc-link {
      display: block;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--amber);
      padding: 0.45rem;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 5px;
      text-decoration: none;
      transition: background 0.15s;
    }
    #nc-link:hover { background: var(--amber-d); }

    /* ── LEGEND ── */
    #legend {
      position: fixed;
      bottom: 1.5rem;
      left: 1.75rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .legend-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .legend-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label {
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── FOOTER ── */
    #footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      border-top: 1px solid var(--border);
      background: rgba(7,7,9,0.9);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      padding: 0 1.75rem;
      gap: 2rem;
      z-index: 10;
    }

    .footer-stat {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .footer-stat strong {
      color: var(--text);
      font-weight: 500;
    }

    #footer-hint {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 0.55rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.05em;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    #loading-title {
      font-family: var(--mono);
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--amber);
    }

    #loading-sub {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    #loading-progress {
      width: 160px;
      height: 1px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    #loading-bar {
      height: 100%;
      background: var(--amber);
      width: 0%;
      transition: width 0.1s;
    }

    /* ── INSTRUCTIONS OVERLAY ── */
    #instructions {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9;
      opacity: 0;
      pointer-events: none;
      display: flex;
      gap: 2rem;
    }

    .instr-item {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 0.4em;
    }
    .instr-key {
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      padding: 0.1em 0.4em;
      font-size: 0.55rem;
    }
  </style>
</head>
<body>
  <canvas id="grain"></canvas>

  <svg id="atlas"></svg>

  <div id="header">
    <div id="logo">⬡ Knowledge Atlas</div>
    <div id="breadcrumb"><span class="bc-current">Overview</span></div>
    <div id="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search" type="text" placeholder="Search notes or tags…" autocomplete="off" spellcheck="false" />
    </div>
    <button id="reset-btn">↩ Overview</button>
  </div>

  <div id="note-card">
    <div id="nc-bar"></div>
    <div id="nc-domain"></div>
    <div id="nc-title"></div>
    <div id="nc-tags"></div>
    <div id="nc-meta"></div>
    <a id="nc-link" href="#" target="_blank">Open note →</a>
  </div>

  <div id="legend"></div>

  <div id="footer">
    <div class="footer-stat"><strong>217</strong> notes</div>
    <div class="footer-stat"><strong>16</strong> domains</div>
    <div class="footer-stat"><strong>1,815</strong> connections</div>
    <div id="footer-hint">hover domain • click to explore • hover note for connections</div>
  </div>

  <div id="instructions">
    <div class="instr-item"><span class="instr-key">hover</span> domain to preview</div>
    <div class="instr-item"><span class="instr-key">click</span> domain to explore</div>
    <div class="instr-item"><span class="instr-key">hover</span> note for activation</div>
  </div>

  <div id="loading">
    <div id="loading-title">Knowledge Atlas</div>
    <div id="loading-sub">Computing knowledge topology…</div>
    <div id="loading-progress"><div id="loading-bar"></div></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
