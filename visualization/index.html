<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Nebula — tech.notes.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070711;
      --surface: rgba(14, 14, 28, 0.92);
      --border: rgba(100, 255, 218, 0.12);
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #64ffda;
      --font-ui: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: var(--font-ui);
      color: var(--text);
      cursor: crosshair;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas { display: block; }

    /* ── LOADING SCREEN ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 2rem;
    }

    #loading-title {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #64ffda, #61dafb, #bd93f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #loading-sub {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.2em;
    }

    .loading-bar {
      width: 200px;
      height: 1px;
      background: rgba(100,255,218,0.15);
      position: relative;
      overflow: hidden;
    }
    .loading-bar::after {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #64ffda, transparent);
      animation: loading-sweep 1.5s infinite;
    }
    @keyframes loading-sweep {
      to { left: 100%; }
    }

    /* ── HEADER ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1.5rem;
      background: linear-gradient(to bottom, rgba(7,7,17,0.9) 0%, transparent 100%);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
    }

    #header-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: var(--font-mono);
    }

    #header-stats {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--muted);
      display: flex;
      gap: 1.5rem;
    }

    .stat-item { display: flex; align-items: center; gap: 0.4rem; }
    .stat-value { color: var(--text); font-weight: 500; }

    #search-container {
      margin-left: auto;
      position: relative;
    }

    #search {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.75rem 0.35rem 2rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text);
      width: 200px;
      transition: border-color 0.2s, width 0.3s;
      outline: none;
    }
    #search:focus {
      border-color: rgba(100,255,218,0.4);
      width: 260px;
    }
    #search::placeholder { color: var(--muted); }
    #search-icon {
      position: absolute;
      left: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.7rem;
      color: var(--muted);
      pointer-events: none;
    }

    /* ── LEGEND ── */
    #legend {
      position: fixed;
      left: 1.25rem;
      top: 70px;
      bottom: 70px;
      width: 200px;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      overflow-y: auto;
      scrollbar-width: none;
    }
    #legend::-webkit-scrollbar { display: none; }

    .legend-header {
      font-size: 0.6rem;
      font-family: var(--font-mono);
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 0.1rem;
    }
    .legend-item:hover { background: rgba(255,255,255,0.05); }
    .legend-item.active { background: rgba(255,255,255,0.08); }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
    }

    .legend-label {
      font-size: 0.7rem;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .legend-count {
      font-size: 0.6rem;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    /* ── INFO PANEL ── */
    #info-panel {
      position: fixed;
      right: 1.25rem;
      top: 70px;
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      z-index: 10;
      opacity: 0;
      transform: translateX(20px);
      pointer-events: none;
      backdrop-filter: blur(12px);
    }

    #info-section-bar {
      width: 3px;
      height: 100%;
      position: absolute;
      left: 0;
      top: 0;
      border-radius: 12px 0 0 12px;
    }

    #info-section-label {
      font-size: 0.6rem;
      font-family: var(--font-mono);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    #info-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.75rem;
      color: #fff;
    }

    #info-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.75rem;
    }

    .info-tag {
      font-size: 0.6rem;
      font-family: var(--font-mono);
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      background: rgba(255,255,255,0.07);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.08);
    }

    #info-meta {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    .info-meta-item { display: flex; align-items: center; gap: 0.3rem; }

    #info-open {
      display: block;
      width: 100%;
      padding: 0.5rem;
      background: rgba(100,255,218,0.08);
      border: 1px solid rgba(100,255,218,0.25);
      border-radius: 6px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    #info-open:hover { background: rgba(100,255,218,0.15); }

    /* ── BOTTOM CONTROLS ── */
    #controls {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.1em;
    }
    .ctrl-btn:hover { border-color: rgba(100,255,218,0.4); color: var(--accent); }
    .ctrl-btn.active { border-color: rgba(100,255,218,0.5); color: var(--accent); background: rgba(100,255,218,0.06); }

    /* ── TOOLTIP ── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 20;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: #fff;
      background: rgba(10,10,24,0.9);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.65rem;
      opacity: 0;
      transform: translate(-50%, -130%);
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    /* ── PULSE COUNTER ── */
    #pulse-counter {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      z-index: 10;
      opacity: 0;
      text-align: right;
    }

    #pulse-counter .pulse-num {
      font-size: 1.2rem;
      color: var(--accent);
      display: block;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-title">Knowledge Nebula</div>
    <div id="loading-sub">Initializing 217 nodes · 1815 connections</div>
    <div class="loading-bar"></div>
  </div>

  <div id="canvas-container"></div>

  <div id="header">
    <div id="header-title">⬡ Knowledge Nebula</div>
    <div id="header-stats">
      <div class="stat-item">
        <span>nodes</span>
        <span class="stat-value" id="stat-nodes">217</span>
      </div>
      <div class="stat-item">
        <span>domains</span>
        <span class="stat-value">16</span>
      </div>
      <div class="stat-item">
        <span>connections</span>
        <span class="stat-value" id="stat-connections">1815</span>
      </div>
    </div>
    <div id="search-container">
      <span id="search-icon">⌕</span>
      <input id="search" type="text" placeholder="Search notes…" autocomplete="off" spellcheck="false" />
    </div>
  </div>

  <div id="legend">
    <div class="legend-header">Domains</div>
    <div id="legend-items"></div>
  </div>

  <div id="info-panel">
    <div id="info-section-bar"></div>
    <div id="info-section-label"></div>
    <div id="info-title"></div>
    <div id="info-tags"></div>
    <div id="info-meta">
      <div class="info-meta-item" id="info-words"></div>
      <div class="info-meta-item" id="info-diagram"></div>
    </div>
    <a id="info-open" href="#" target="_blank">Open note →</a>
  </div>

  <div id="controls">
    <button class="ctrl-btn active" id="btn-rotate">⟳ Auto-rotate</button>
    <button class="ctrl-btn" id="btn-connections">⬡ Show all connections</button>
    <button class="ctrl-btn" id="btn-reset">⌖ Reset view</button>
  </div>

  <div id="tooltip"></div>

  <div id="pulse-counter">
    <span class="pulse-num" id="pulse-num">0</span>
    synaptic pulses
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
