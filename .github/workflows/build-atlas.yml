name: Build Knowledge Atlas

# Re-builds the D3 visualization and commits the output to atlas/
# whenever visualization sources or data change on main.

on:
  push:
    branches: [main]
    paths:
      - "visualization/src/**"
      - "visualization/package*.json"
      - "visualization/vite.config.js"
      - "visualization/index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: visualization/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: visualization

      - name: Build atlas
        run: npm run build
        working-directory: visualization

      - name: Commit rebuilt atlas
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add atlas/
          if git diff --cached --quiet; then
            echo "No changes in atlas/ — skipping commit"
          else
            git commit -m "build: rebuild Knowledge Atlas [skip ci]"
            git push
          fi
